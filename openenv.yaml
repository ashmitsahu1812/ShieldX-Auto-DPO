name: code_review_env
version: "1.0.0"
description: Simulates software pull request review workflows with adversarial challenges.

entrypoint:
  command: uvicorn server.app:app --host 0.0.0.0 --port 7860

interface:
  endpoints:
    reset: /reset
    step: /step

tasks:
  - id: syntax_review
    name: Syntax & Style Review
    description: Detect basic syntax errors and naming convention violations.
    difficulty: easy
  - id: bug_detection
    name: Bug Detection
    description: Identify logical flaws and off-by-one errors.
    difficulty: medium
  - id: full_review
    name: Full Architectural Review
    description: Complex multi-file dependencies and logic regressions.
    difficulty: hard
  - id: adversarial_review
    name: Adversarial Security Review
    description: Audit deceptive code designed to bypass basic static analysis.
    difficulty: expert
