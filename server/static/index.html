<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldX | Autonomous DPO Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="glass-background"></div>
    
    <main class="dashboard-container">
        <header class="top-bar glass">
            <div class="logo-section">
                <span class="shield-icon">🛡️</span>
                <h1>ShieldX <span class="badge">PRO</span></h1>
            </div>
            <div class="session-info">
                <div id="region-tag" class="status-chip">Region: EU-WEST-1</div>
                <div id="step-counter" class="status-chip">Step: 0/5</div>
                <div id="score-display" class="score-chip">Score: 0.00</div>
            </div>
        </header>

        <section class="grid-layout">
            <!-- Left Panel: Monitor -->
            <div class="panel monitor-panel glass">
                <div class="panel-header">
                    <h2>🔍 Live Data Monitor</h2>
                    <div id="task-badge" class="task-badge">Task 001</div>
                </div>
                <div class="data-viewport" id="data-buffer">
                    <div class="loading-spinner"></div>
                </div>
                <div class="panel-footer">
                    <p id="env-instruction">Initializing ShieldX environment...</p>
                </div>
            </div>

            <!-- Right Panel: Intelligence -->
            <div class="panel intel-panel glass">
                <div class="panel-header">
                    <h2>⚖️ Policy & Regulation</h2>
                </div>
                <div class="policy-viewport" id="policy-context">
                    <!-- Policies load here -->
                </div>
            </div>

            <!-- Bottom Left: History -->
            <div class="panel history-panel glass">
                <div class="panel-header">
                    <h2>📜 Audit Trace</h2>
                </div>
                <div class="history-list" id="audit-history">
                    <!-- Action logs load here -->
                </div>
            </div>

            <!-- Bottom Right: Action Console -->
            <div class="panel console-panel glass">
                <div class="panel-header">
                    <h2>⚙️ Compliance Console</h2>
                </div>
                <div class="console-controls">
                    <div class="control-group">
                        <label>Operation</label>
                        <div class="radio-buttons">
                            <label><input type="radio" name="operation" value="redact" checked> Redact</label>
                            <label><input type="radio" name="operation" value="delete"> Delete</label>
                            <label><input type="radio" name="operation" value="export"> Export</label>
                            <label><input type="radio" name="operation" value="retain"> Retain</label>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>Target</label>
                        <input type="text" id="action-target" placeholder="Field, Value, or ID">
                    </div>
                    <button id="execute-btn" class="primary-btn">EXECUTE ACTION</button>
                    
                    <div class="task-switcher">
                        <select id="task-select">
                            <option value="task-001-pii-scrubber">Task 001: PII Scrubber</option>
                            <option value="task-002-dsar-export">Task 002: DSAR Export</option>
                            <option value="task-003-selective-erasure">Task 003: Selective Erasure</option>
                            <option value="task-004-cross-border-audit">Task 004: Border Audit</option>
                            <option value="task-005-breach-reporting">Task 005: Breach Report</option>
                        </select>
                        <button id="reset-btn" class="secondary-btn">INITIALIZE AUDIT</button>
                    </div>
                </div>
                <div id="action-status" class="action-alert hidden"></div>
            </div>
        </section>
    </main>

    <script src="/static/main.js"></script>
</body>
</html>
