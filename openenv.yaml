name: shieldx_privacy_env
version: "1.0.0"
description: >
  Autonomous Data Privacy Officer (DPO) Environment.
  Agents must audit database logs, perform redactions, and manage
  legal compliance (GDPR/CCPA) across multiple tasks.
author: ashmitsahu
tags:
  - openenv
  - privacy
  - compliance
  - governance
  - rl

entrypoint:
  command: uvicorn server.app:app --host 0.0.0.0 --port 7860

interface:
  base_url: http://localhost:7860
  endpoints:
    reset: /reset
    step: /step
    state: /state
    health: /health

observation_space:
  type: object
  description: >
    Current audit context including raw data buffer and legal policy context.
  properties:
    task_id:
      type: string
    instruction:
      type: string
    data_buffer:
      type: string
    policy_context:
      type: string
    region:
      type: string
    step_count:
      type: integer
    max_steps:
      type: integer

action_space:
  type: object
  description: >
    Data privacy operations.
  properties:
    operation:
      type: string
      enum: [redact, delete, export, retain, notify]
    target:
      type: string
    legal_basis:
      type: string
    reasoning:
      type: string

tasks:
  - id: task-001-pii-scrubber
    name: PII Discovery and Redaction
    description: Scan logs and redact Name, Email, SSN, and IP.
    difficulty: easy
    max_steps: 5
    reward_range: [0.0, 1.0]

  - id: task-002-dsar-export
    name: Subject Access Request (DSAR)
    description: Export specific user data without leakage.
    difficulty: medium
    max_steps: 5
    reward_range: [0.0, 1.0]

  - id: task-003-selective-erasure
    name: Selective Erasure (Retain vs Delete)
    description: Delete profile but keep billing history for taxes.
    difficulty: medium
    max_steps: 5
    reward_range: [0.0, 1.0]

  - id: task-004-cross-border-audit
    name: Cross-Border Compliance Audit
    description: Detect and audit non-SCC data transfers to the US.
    difficulty: hard
    max_steps: 5
    reward_range: [0.0, 1.0]

  - id: task-005-breach-reporting
    name: Automated Breach Disclosure
    description: Analyze SQLi logs and identify all affected IDs.
    difficulty: hard
    max_steps: 5
    reward_range: [0.0, 1.0]
