spec_version: 1
name: stock_exchange_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
version: "1.0.0"
description: >
  Real-world stock execution and risk-management simulation for training
  trading agents with deterministic market scenarios.
author: ashmitsahu
tags:
  - openenv
  - finance
  - stock-market
  - rl

entrypoint:
  command: uvicorn server.app:app --host 0.0.0.0 --port 8000

interface:
  base_url: http://localhost:8000
  endpoints:
    reset: /reset
    step: /step
    state: /state
    health: /health
    grader: /grader

observation_space:
  type: object
  properties:
    task_id:
      type: string
    symbol:
      type: string
    objective:
      type: string
    day_index:
      type: integer
    max_days:
      type: integer
    current_price:
      type: number
    next_price:
      type: number
    cash:
      type: number
    position:
      type: integer
    portfolio_value:
      type: number
    drawdown:
      type: number

action_space:
  type: object
  properties:
    symbol:
      type: string
    decision:
      type: string
      enum: [buy, sell, hold]
    quantity:
      type: integer
    confidence:
      type: number
    rationale:
      type: string

tasks:
  - id: task-001-trend-following
    name: Trend-Following Execution
    difficulty: easy
    description: Capture an upward trend with disciplined exits.
    reward_range: [0.11, 0.89]

  - id: task-002-mean-reversion
    name: Mean-Reversion Swing
    difficulty: medium
    description: Buy pullbacks and trim into rebound zones.
    reward_range: [0.11, 0.89]

  - id: task-003-risk-managed-hedge
    name: Risk-Managed Event Trading
    difficulty: hard
    description: Manage volatile downside with risk-aware position sizing.
    reward_range: [0.11, 0.89]
